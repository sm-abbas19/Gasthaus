# ═══════════════════════════════════════════════════════════════
# LOCAL SECRETS IMPORT
# Spring Boot 2.4+ supports importing additional property files.
# application-local.properties lives next to the JAR / in the
# working directory and is gitignored — it holds all secrets.
# "optional:" means the app still starts if the file is absent
# (e.g. in CI where secrets come from environment variables instead).
# NestJS equivalent: dotenv loading .env at process startup.
# ═══════════════════════════════════════════════════════════════
spring.config.import=optional:file:./application-local.properties

# ═══════════════════════════════════════════════════════════════
# SERVER
# ═══════════════════════════════════════════════════════════════
server.port=8080
server.servlet.context-path=/api

# ═══════════════════════════════════════════════════════════════
# DATASOURCE
# Credentials come from application-local.properties or env vars.
# DB_URL / DB_USERNAME / DB_PASSWORD must be set in one of those.
# ═══════════════════════════════════════════════════════════════
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ═══════════════════════════════════════════════════════════════
# JPA / HIBERNATE
# ═══════════════════════════════════════════════════════════════
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=gasthaus_java

# ═══════════════════════════════════════════════════════════════
# CACHE — Redis
# ═══════════════════════════════════════════════════════════════
spring.cache.type=redis
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}

# ═══════════════════════════════════════════════════════════════
# MULTIPART (file uploads)
# ═══════════════════════════════════════════════════════════════
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ═══════════════════════════════════════════════════════════════
# CLOUDINARY
# Read from env vars — same names as the NestJS .env file.
# ═══════════════════════════════════════════════════════════════
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ═══════════════════════════════════════════════════════════════
# FASTAPI AI SERVICE
# ═══════════════════════════════════════════════════════════════
app.fastapi.url=${FASTAPI_URL:http://localhost:8000}

# ═══════════════════════════════════════════════════════════════
# JWT
# Secret must be at least 256 bits (32 chars) for HS256.
# Set JWT_SECRET in application-local.properties or env vars.
# JWT_EXPIRATION defaults to 24 hours (86400000 ms).
# ═══════════════════════════════════════════════════════════════
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
