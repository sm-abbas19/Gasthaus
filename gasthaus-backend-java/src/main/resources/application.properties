# ═══════════════════════════════════════════════════════════════
# SERVER
# NestJS equivalent: app.listen(3001) in main.ts
# Spring Boot runs on 8080 by default — NestJS is on 3001, no conflict.
# ═══════════════════════════════════════════════════════════════
server.port=8080

# ═══════════════════════════════════════════════════════════════
# DATASOURCE (JDBC connection)
# NestJS equivalent: DATABASE_URL in .env consumed by Prisma
# JDBC URL format: jdbc:postgresql://<host>:<port>/<database>
# Uses the same Docker container as the NestJS backend.
# ═══════════════════════════════════════════════════════════════
spring.datasource.url=jdbc:postgresql://localhost:5432/gasthaus
spring.datasource.username=gasthaus
spring.datasource.password=gasthaus123
spring.datasource.driver-class-name=org.postgresql.Driver

# ═══════════════════════════════════════════════════════════════
# JPA / HIBERNATE
# NestJS equivalent: Prisma's migrate / generate commands
# ═══════════════════════════════════════════════════════════════

# ddl-auto controls schema management:
#   none        — do nothing (production, you manage migrations)
#   validate    — verify schema matches entities, fail if not
#   update      — alter tables to match entities, never drops columns
#   create      — drop and recreate on every start
#   create-drop — create on start, drop on shutdown (tests)
# We use "update" in dev: safe to restart without losing data.
spring.jpa.hibernate.ddl-auto=update

# Tell Hibernate we're using PostgreSQL so it generates correct SQL dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Log generated SQL — very useful while learning. Disable in production.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use a separate PostgreSQL schema so Spring Boot tables don't collide
# with the NestJS/Prisma tables in the same database.
# Prisma writes to the "public" schema; we write to "gasthaus_java".
# PostgreSQL requires this schema to exist before Hibernate can use it.
# Run: CREATE SCHEMA IF NOT EXISTS gasthaus_java;  in psql first.
spring.jpa.properties.hibernate.default_schema=gasthaus_java

# ═══════════════════════════════════════════════════════════════
# JWT (used in Phase 3 — defined here so the app starts cleanly)
# NestJS equivalent: JWT_SECRET in .env
# ═══════════════════════════════════════════════════════════════
app.jwt.secret=gasthaus-super-secret-jwt-key-change-in-production-must-be-at-least-256-bits
app.jwt.expiration=86400000
