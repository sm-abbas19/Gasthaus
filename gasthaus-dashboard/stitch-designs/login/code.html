        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed h-screen overflow-hidden">
<main class="flex h-full w-full">
<!-- Left Pane: Split Layout 55% -->
<section class="hidden lg:flex lg:w-[55%] relative flex-col justify-end p-20 bg-[#1C1C1E]">
<!-- Dark Overlay and Background Image -->
<div class="absolute inset-0 z-0">
<img alt="Elegant restaurant table setting overhead" class="w-full h-full object-cover opacity-40 grayscale-[0.5]" data-alt="Elegant restaurant table setting with white linen and wine glasses" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDoTLwpqXWfOnk8XzEt5QqtUkXRVv1ImwJw9Z1b55q_jp4p34zI2dY_nNmgbUap3nOnmxaQhJtb9H0iljl-qTrI8sCf4GteH07U1gO4UkoH5aLIdMtX-9AMCZSH8aXSE2RR1s-vgEUPYsX9YuBpBlPoJl_-Hb5kAMjA1c_PFn-WjEDt1cKvMlppNRn6J6ytUbp9z3dQgP6TUaf9ggpADW4cG8wv4cdrxPn0Iep_vERnH2Y__7Xd0My7B-iLFJyEWlhaQmjqihFrlWM"/>
<div class="absolute inset-0 bg-black/40"></div>
</div>
<!-- Content Overlay -->
<div class="relative z-10 space-y-4">
<h1 class="text-5xl font-light text-white leading-tight tracking-tight">
                    Where every order matters.
                </h1>
</div>
</section>
<!-- Right Pane: Login Form 45% -->
<section class="w-full lg:w-[45%] bg-surface-container-lowest flex flex-col justify-between p-12 md:p-16 lg:p-24">
<!-- Branding -->
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#1C1C1E] !text-[24px]">restaurant</span>
<span class="text-[13px] font-semibold tracking-[0.3em] text-[#1C1C1E]">GASTHAUS</span>
</div>
<!-- Main Form Area -->
<div class="max-w-md w-full mx-auto lg:mx-0">
<div class="mb-10">
<h2 class="text-[28px] font-semibold text-[#1C1C1E] tracking-tight mb-2">Staff Portal</h2>
<p class="text-[14px] text-secondary font-normal">Sign in to your account</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[12px] font-medium text-on-surface-variant tracking-[0.04em] uppercase" for="email">
                            Email
                        </label>
<input class="w-full h-[44px] bg-[#FAFAFA] border border-[#D1D5DB] rounded-[6px] px-4 text-[14px] text-[#111827] placeholder-[#9CA3AF] transition-colors" id="email" name="email" placeholder="Enter your email" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-[12px] font-medium text-on-surface-variant tracking-[0.04em] uppercase" for="password">
                                Password
                            </label>
<button class="text-[12px] text-primary hover:text-primary-container font-medium transition-colors" type="button">
                                Forgot?
                            </button>
</div>
<div class="relative">
<input class="w-full h-[44px] bg-[#FAFAFA] border border-[#D1D5DB] rounded-[6px] px-4 pr-12 text-[14px] text-[#111827] transition-colors" id="password" name="password" type="password" value="password123"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-secondary hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined !text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- CTA Button -->
<button class="w-full h-[44px] bg-[#D97706] text-white font-semibold text-[14px] tracking-[0.02em] rounded-[6px] hover:bg-primary-container transition-all active:scale-[0.98]" type="submit">
                        Login
                    </button>
</form>
<!-- Alternate Sign In -->
</div>
<!-- Footer -->
<div class="flex justify-center items-center pb-10">
<p class="text-[11px] text-[#9CA3AF] font-normal text-center">
                    © 2025 Gasthaus. ALL RIGHTS RESERVED.
                </p>
</div>
</section>
</main>
</body></html>
