<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Your Cart - Gasthaus</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-fixed": "#001d32",
              "on-secondary-container": "#784c25",
              "tertiary-fixed": "#cee5ff",
              "error": "#ba1a1a",
              "secondary-fixed-dim": "#f7ba8a",
              "on-tertiary-fixed-variant": "#004a75",
              "on-primary-container": "#fffbff",
              "outline": "#887364",
              "secondary-container": "#fdbf8f",
              "tertiary-container": "#007abd",
              "primary-fixed": "#ffdcc3",
              "on-secondary-fixed": "#2f1500",
              "surface-bright": "#f9f9f7",
              "primary-fixed-dim": "#ffb77d",
              "on-background": "#1a1c1b",
              "on-secondary": "#ffffff",
              "inverse-surface": "#2f3130",
              "on-error-container": "#93000a",
              "on-surface-variant": "#554336",
              "surface-container-low": "#f4f4f2",
              "surface-container-high": "#e8e8e6",
              "primary": "#8d4b00",
              "on-error": "#ffffff",
              "on-tertiary-container": "#fdfcff",
              "on-surface": "#1a1c1b",
              "background": "#f9f9f7",
              "surface-container-lowest": "#ffffff",
              "on-primary-fixed": "#2f1500",
              "secondary": "#82542c",
              "outline-variant": "#dbc2b0",
              "on-primary": "#ffffff",
              "on-tertiary": "#ffffff",
              "inverse-on-surface": "#f1f1ef",
              "surface-container-highest": "#e2e3e1",
              "tertiary-fixed-dim": "#96ccff",
              "surface-dim": "#dadad8",
              "error-container": "#ffdad6",
              "tertiary": "#006096",
              "primary-container": "#b15f00",
              "on-primary-fixed-variant": "#6e3900",
              "surface-tint": "#904d00",
              "surface-variant": "#e2e3e1",
              "surface-container": "#eeeeec",
              "secondary-fixed": "#ffdcc3",
              "on-secondary-fixed-variant": "#673d17",
              "inverse-primary": "#ffb77d",
              "surface": "#f9f9f7"

            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #F9F9F7;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface min-h-screen pb-32">
<!-- TopAppBar Section -->
<header class="w-full sticky top-0 z-50 bg-[#F9F9F7] dark:bg-stone-900 flex items-center justify-between px-5 h-16">
<div class="flex items-center gap-4">
<button class="hover:bg-stone-200/50 dark:hover:bg-stone-700/50 transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#D97706] dark:text-amber-500" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<h1 class="font-['Inter'] font-bold text-lg tracking-tight text-[#1A1C1B] dark:text-stone-100">Your Cart</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="max-w-2xl mx-auto px-5 pt-4 space-y-6">
<!-- Table Chip -->
<div class="flex justify-start">
<div class="inline-flex items-center gap-2 px-4 py-1.5 bg-[#FEF3C7] rounded-full">
<span class="material-symbols-outlined text-[18px] text-[#D97706]" data-icon="table_restaurant">table_restaurant</span>
<span class="text-[#D97706] font-bold text-[13px] tracking-wide">Table 4</span>
</div>
</div>
<!-- Cart Items List -->
<section class="space-y-4">
<!-- Item 1 -->
<div class="bg-surface-container-lowest border border-outline-variant/20 rounded-xl p-4 flex flex-col gap-4">
<div class="flex gap-4">
<img alt="Mediterranean Salad" class="w-16 h-16 rounded-lg object-cover" data-alt="Close-up of a vibrant Mediterranean salad with fresh greens, cherry tomatoes, and feta cheese in a ceramic bowl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGrSL3WWkbDERWp-BH8Wo9maOHbnusR0qwCZL8M_oP4XTpLpfXKz3FPW20U5VkkAyK8XTjP8vKAkaK5-FWP46sMobA1vSvT5-hE7QVgDIGW_zXWhZ3fKfhIiJW1fAeTqodcR0GuctLMiOToo68I3PDi_6e5dVXtkYMek3mmYnw-6YFd1XOaxpDkuk3cBEEoLK7npLa4PgrxrnqmEKPDJ35jIGUuqxd2heHMnbTmMgT0Y6G5l_Rl1Nwbn7URVfSCCv7tXdIlSxX-g"/>
<div class="flex-1">
<h3 class="text-[14px] font-bold text-[#111827]">Artisanal Burrata Salad</h3>
<p class="text-[13px] text-[#9CA3AF]">Rs. 850</p>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center bg-surface-container-low rounded-full p-1 gap-4">
<button class="w-7 h-7 flex items-center justify-center rounded-full bg-surface-container-lowest hover:bg-stone-100 transition-colors active:scale-90">
<span class="material-symbols-outlined text-[18px]" data-icon="remove">remove</span>
</button>
<span class="text-[14px] font-bold w-4 text-center">1</span>
<button class="w-7 h-7 flex items-center justify-center rounded-full bg-surface-container-lowest hover:bg-stone-100 transition-colors active:scale-90">
<span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>
</button>
</div>
<p class="text-[15px] font-bold text-[#D97706]">Rs. 850</p>
</div>
</div>
<!-- Item 2 -->
<div class="bg-surface-container-lowest border border-outline-variant/20 rounded-xl p-4 flex flex-col gap-4">
<div class="flex gap-4">
<img alt="Wood-fired Pizza" class="w-16 h-16 rounded-lg object-cover" data-alt="Rustic wood-fired pepperoni pizza with melted mozzarella and fresh basil leaves on a dark wooden board" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAXkR2SG77BC-by9pU1XgB8Rg2kp5cobOl6X-xbXghRTtFRGNCCUeK5s8jc-cwNUBU2YP8J6el8TCXzL13Jx8bUa8n0mJh21RUJ0ySNceeRIP2Y1gha0QVT_Oi6aH00hY4HMfhblA0eL5gYk3K5wU6NQabcAU-cC7yXMGr1wr7fCrbSaLUf9f90dr9xFWbXQ6OXLH_ZPHqBJraCTYUSltS-xS4l7mL4fl5SQCmoCyNn1sMZY4iyZakf2WSWFYfWiJId77EaA-T1-w"/>
<div class="flex-1">
<h3 class="text-[14px] font-bold text-[#111827]">Truffle Mushroom Pizza</h3>
<p class="text-[13px] text-[#9CA3AF]">Rs. 1,250</p>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center bg-surface-container-low rounded-full p-1 gap-4">
<button class="w-7 h-7 flex items-center justify-center rounded-full bg-surface-container-lowest hover:bg-stone-100 transition-colors active:scale-90">
<span class="material-symbols-outlined text-[18px]" data-icon="remove">remove</span>
</button>
<span class="text-[14px] font-bold w-4 text-center">1</span>
<button class="w-7 h-7 flex items-center justify-center rounded-full bg-surface-container-lowest hover:bg-stone-100 transition-colors active:scale-90">
<span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>
</button>
</div>
<p class="text-[15px] font-bold text-[#D97706]">Rs. 1,250</p>
</div>
</div>
</section>
<!-- Special Instructions -->
<div class="bg-surface-container-lowest border border-outline-variant/20 rounded-xl p-4 space-y-3">
<label class="block font-['Inter'] text-[11px] font-bold uppercase tracking-[0.08em] text-[#9CA3AF]">SPECIAL INSTRUCTIONS</label>
<textarea class="w-full h-20 bg-surface-container-low border-none rounded-lg p-3 text-[14px] placeholder:text-stone-400 focus:ring-1 focus:ring-primary-container/30 resize-none" placeholder="Any allergies or special requests?"></textarea>
</div>
<!-- Order Summary Card -->
<div class="bg-surface-container-lowest border border-outline-variant/20 rounded-xl p-5 space-y-4">
<div class="flex justify-between items-center text-[14px]">
<span class="text-on-surface-variant">Subtotal</span>
<span class="font-medium text-on-surface">Rs. 2,100</span>
</div>
<div class="flex justify-between items-center text-[14px]">
<span class="text-on-surface-variant">Tax (5%)</span>
<span class="font-medium text-on-surface">Rs. 105</span>
</div>
<div class="flex justify-between items-center text-[14px]">
<span class="text-on-surface-variant">Service Charge</span>
<span class="font-medium text-on-surface">Rs. 195</span>
</div>
<div class="pt-4 mt-2 border-t border-dashed border-outline-variant/30 flex justify-between items-center">
<span class="text-[16px] font-bold text-[#111827]">Total</span>
<span class="text-[18px] font-bold text-[#D97706]">Rs. 2,400</span>
</div>
</div>
</main>
<!-- Bottom Sticky Area -->
<footer class="fixed bottom-0 w-full z-50 bg-[#FFFFFF] dark:bg-stone-950 border-t border-stone-200/20 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] p-5">
<div class="max-w-2xl mx-auto">
<button class="w-full h-[52px] rounded-[10px] bg-gradient-to-br from-[#8D4B00] to-[#B15F00] text-white font-bold flex items-center justify-center gap-2 active:scale-[0.98] transition-all hover:opacity-90">
<span>Place Order · Rs. 2,400</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
<!-- Invisible placeholder to allow scrolling past sticky footer -->
<div class="h-24"></div>
<!-- Minimal Bottom Decoration/Copyright per Design System -->
<div class="w-full py-8 text-center pb-32">
<p class="font-['Inter'] text-[11px] font-bold uppercase tracking-[0.08em] text-[#9CA3AF]">Gasthaus Editorial Gastronomy</p>
</div>
</body></html>
