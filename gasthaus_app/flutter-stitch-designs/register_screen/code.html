<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#cee5ff",
                        "surface-tint": "#904d00",
                        "tertiary-container": "#007abd",
                        "surface-dim": "#dadad8",
                        "inverse-primary": "#ffb77d",
                        "surface": "#f9f9f7",
                        "surface-bright": "#f9f9f7",
                        "primary": "#8d4b00",
                        "on-error": "#ffffff",
                        "primary-fixed": "#ffdcc3",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#001d32",
                        "surface-container": "#eeeeec",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#fdfcff",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#ffb77d",
                        "background": "#f9f9f7",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e2e3e1",
                        "on-error-container": "#93000a",
                        "outline": "#887364",
                        "on-secondary-fixed-variant": "#673d17",
                        "on-tertiary-fixed-variant": "#004a75",
                        "on-primary-container": "#fffbff",
                        "on-background": "#1a1c1b",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#b15f00",
                        "surface-container-high": "#e8e8e6",
                        "secondary-container": "#fdbf8f",
                        "secondary-fixed-dim": "#f7ba8a",
                        "on-secondary-fixed": "#2f1500",
                        "on-primary-fixed-variant": "#6e3900",
                        "inverse-on-surface": "#f1f1ef",
                        "secondary-fixed": "#ffdcc3",
                        "on-primary-fixed": "#2f1500",
                        "tertiary-fixed-dim": "#96ccff",
                        "on-surface": "#1a1c1b",
                        "on-secondary-container": "#784c25",
                        "tertiary": "#006096",
                        "outline-variant": "#dbc2b0",
                        "on-surface-variant": "#554336",
                        "surface-variant": "#e2e3e1",
                        "surface-container-low": "#f4f4f2",
                        "inverse-surface": "#2f3130",
                        "secondary": "#82542c"
                    },
                    fontFamily: {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .ghost-border {
            border: 1px solid rgba(219, 194, 176, 0.2);
        }
        .amber-gradient {
            background: linear-gradient(135deg, #8d4b00 0%, #b15f00 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-background min-h-screen flex flex-col items-center justify-center p-5">
<!-- Top Navigation Anchor (Suppressed for transactional flow) -->
<div class="w-full max-w-md flex flex-col items-center">
<!-- Brand Header -->
<header class="flex flex-col items-center mb-10">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-[#D97706] text-3xl" data-icon="restaurant">restaurant</span>
<h1 class="font-headline font-extrabold text-[#111827] text-xl tracking-[0.15em] uppercase">GASTHAUS</h1>
</div>
<p class="text-on-surface-variant text-sm font-medium">Create your account.</p>
</header>
<!-- Registration Card -->
<div class="w-full bg-surface-container-lowest rounded-xl p-4 border border-[#E5E7EB]">
<div class="mb-6">
<h2 class="text-[11px] font-bold tracking-widest text-[#9CA3AF] uppercase">CREATE ACCOUNT</h2>
</div>
<form class="flex flex-col gap-3">
<!-- Full Name Field -->
<div class="flex flex-col gap-1.5">
<label class="text-[10px] font-bold text-on-surface-variant tracking-wider uppercase px-1">FULL NAME</label>
<input class="h-[52px] w-full px-4 rounded-lg bg-surface-container-lowest ghost-border focus:ring-1 focus:ring-primary focus:outline-none text-on-surface placeholder:text-neutral-400" placeholder="Ahmed Al-Hassan" type="text"/>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="text-[10px] font-bold text-on-surface-variant tracking-wider uppercase px-1">EMAIL</label>
<input class="h-[52px] w-full px-4 rounded-lg bg-surface-container-lowest ghost-border focus:ring-1 focus:ring-primary focus:outline-none text-on-surface placeholder:text-neutral-400" placeholder="you@example.com" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<label class="text-[10px] font-bold text-on-surface-variant tracking-wider uppercase px-1">PASSWORD</label>
<div class="relative">
<input class="h-[52px] w-full px-4 pr-12 rounded-lg bg-surface-container-lowest ghost-border focus:ring-1 focus:ring-primary focus:outline-none text-on-surface placeholder:text-neutral-400" placeholder="Min. 6 characters" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-1.5">
<label class="text-[10px] font-bold text-on-surface-variant tracking-wider uppercase px-1">CONFIRM PASSWORD</label>
<div class="relative">
<input class="h-[52px] w-full px-4 pr-12 rounded-lg bg-surface-container-lowest ghost-border focus:ring-1 focus:ring-primary focus:outline-none text-on-surface placeholder:text-neutral-400" placeholder="Repeat password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Primary Action Button -->
<button class="h-[52px] w-full mt-4 amber-gradient text-white font-bold rounded-[10px] tracking-wide text-sm active:scale-[0.98] transition-transform" type="submit">
                    Create Account
                </button>
</form>
</div>
<!-- Footer Links -->
<footer class="mt-8 flex items-center gap-1.5 text-sm">
<span class="text-[#6B7280]">Already have an account?</span>
<a class="text-[#D97706] font-bold hover:opacity-80 transition-opacity" href="#">Sign in</a>
</footer>
</div>
<!-- Background Decorative Elements (Editorial Style) -->
<div class="fixed top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary-fixed-dim/10 rounded-full blur-[80px] -z-10"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[30%] h-[30%] bg-secondary-fixed-dim/10 rounded-full blur-[60px] -z-10"></div>
</body></html>
