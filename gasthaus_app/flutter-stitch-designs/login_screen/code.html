<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "secondary-fixed-dim": "#f7ba8a",
              "secondary": "#82542c",
              "on-primary-fixed": "#2f1500",
              "inverse-primary": "#ffb77d",
              "secondary-fixed": "#ffdcc3",
              "surface-container-high": "#e8e8e6",
              "on-secondary-fixed-variant": "#673d17",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed": "#2f1500",
              "tertiary-fixed-dim": "#96ccff",
              "surface-variant": "#e2e3e1",
              "on-tertiary-container": "#fdfcff",
              "tertiary-container": "#007abd",
              "surface-tint": "#904d00",
              "on-tertiary-fixed-variant": "#004a75",
              "surface-container-highest": "#e2e3e1",
              "on-secondary": "#ffffff",
              "on-surface": "#1a1c1b",
              "on-primary-fixed-variant": "#6e3900",
              "surface-container-low": "#f4f4f2",
              "surface-container": "#eeeeec",
              "primary-container": "#b15f00",
              "outline-variant": "#dbc2b0",
              "surface-bright": "#f9f9f7",
              "primary-fixed": "#ffdcc3",
              "on-secondary-container": "#784c25",
              "primary-fixed-dim": "#ffb77d",
              "on-background": "#1a1c1b",
              "on-primary": "#ffffff",
              "secondary-container": "#fdbf8f",
              "surface-dim": "#dadad8",
              "outline": "#887364",
              "inverse-surface": "#2f3130",
              "on-error": "#ffffff",
              "on-tertiary-fixed": "#001d32",
              "primary": "#8d4b00",
              "error-container": "#ffdad6",
              "on-error-container": "#93000a",
              "surface": "#f9f9f7",
              "tertiary": "#006096",
              "on-surface-variant": "#554336",
              "error": "#ba1a1a",
              "on-primary-container": "#fffbff",
              "inverse-on-surface": "#f1f1ef",
              "tertiary-fixed": "#cee5ff",
              "background": "#f9f9f7"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .letter-spacing-widest {
            letter-spacing: 0.3em;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#F9F9F7] font-body text-on-surface min-h-screen flex items-center justify-center p-5">
<div class="w-full max-w-md flex flex-col items-center">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-[#D97706] text-3xl" data-icon="restaurant">restaurant</span>
<h1 class="font-headline font-extrabold text-[18px] text-[#111827] letter-spacing-widest uppercase">GASTHAUS</h1>
</div>
<p class="text-[13px] text-[#9CA3AF] font-medium">Your table is waiting.</p>
</div>
<!-- Main Form Card -->
<div class="w-full bg-white rounded-xl border border-[#E5E7EB] p-8 shadow-sm">
<header class="mb-8">
<h2 class="text-[13px] font-bold uppercase text-[#9CA3AF] tracking-[0.3em]">SIGN IN</h2>
</header>
<form class="flex flex-col gap-6">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-[11px] font-bold uppercase text-[#6B7280] tracking-wider" for="email">EMAIL</label>
<input class="w-full h-[52px] px-4 rounded-lg bg-surface-container-lowest border border-[#E5E7EB] focus:ring-1 focus:ring-[#D97706] focus:border-[#D97706] outline-none transition-all placeholder:text-neutral-300" id="email" name="email" placeholder="you@example.com" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="text-[11px] font-bold uppercase text-[#6B7280] tracking-wider" for="password">PASSWORD</label>
<div class="relative">
<input class="w-full h-[52px] px-4 pr-12 rounded-lg bg-surface-container-lowest border border-[#E5E7EB] focus:ring-1 focus:ring-[#D97706] focus:border-[#D97706] outline-none transition-all placeholder:text-neutral-300" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-[#6B7280] flex items-center justify-center" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end -mt-2">
<a class="text-[12px] text-[#D97706] font-medium hover:underline" href="#">Forgot password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full h-[52px] bg-[#D97706] text-white font-bold rounded-[10px] uppercase tracking-widest text-[14px] shadow-lg shadow-[#D97706]/20 hover:bg-[#B45309] active:scale-95 transition-all duration-150 mt-2" type="submit">
                    Sign In
                </button>
</form>
</div>
<!-- Footer Link -->
<p class="mt-8 text-[14px] text-[#6B7280]">
            Don't have an account? <a class="text-[#D97706] font-bold hover:underline" href="#">Create one</a>
</p>
<!-- Aesthetic Detail: Bottom Brand Mark -->
<div class="mt-16 opacity-10">
<span class="material-symbols-outlined text-6xl" data-icon="wine_bar">wine_bar</span>
</div>
</div>
</body></html>
