version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gasthaus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gasthaus
      POSTGRES_PASSWORD: gasthaus123
      POSTGRES_DB: gasthaus
    ports:
      - '5432:5432'
    volumes:
      - gasthaus_pgdata:/var/lib/postgresql/data

  mongodb:
    image: mongo:7-jammy
    container_name: gasthaus_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: gasthaus
      MONGO_INITDB_ROOT_PASSWORD: gasthaus123
      MONGO_INITDB_DATABASE: gasthaus_ai
    ports:
      - '27017:27017'
    volumes:
      - gasthaus_mongodata:/data/db

  pgadmin:
    image: dpage/pgadmin4
    container_name: gasthaus_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gasthaus.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: gasthaus_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - gasthaus_redisdata:/var/lib/redis/data

volumes:
  gasthaus_pgdata:
  gasthaus_mongodata:
  gasthaus_redisdata: