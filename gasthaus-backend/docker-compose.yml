version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gasthaus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gasthaus
      POSTGRES_PASSWORD: gasthaus123
      POSTGRES_DB: gasthaus
    ports:
      - '5432:5432'
    volumes:
      - gasthaus_pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: gasthaus_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gasthaus.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  gasthaus_pgdata: